{% extends 'store/base.html' %}
{% load static %}

{% block title %}Add Product - EcomHub{% endblock %}

{% block extra_css %}
<style>
    :root {
        --bg-card: rgba(20, 20, 20, 0.6);
        --border-glass: rgba(255, 255, 255, 0.08);
        --neon-cyan: #00f2fe;
        --neon-purple: #4facfe;
        --gradient-primary: linear-gradient(135deg, var(--neon-cyan) 0%, var(--neon-purple) 100%);
    }

    .glass-card {
        background: var(--bg-card);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid var(--border-glass);
        border-radius: 20px;
        padding: 3rem;
        max-width: 800px;
        margin: 0 auto;
    }

    .neon-title {
        font-size: 2.5rem;
        font-weight: 800;
        color: white;
        margin-bottom: 2rem;
        display: flex;
        align-items: center;
        gap: 15px;
    }

    .neon-title::before {
        content: '';
        display: block;
        width: 6px;
        height: 35px;
        background: var(--gradient-primary);
        border-radius: 10px;
    }

    /* Form Inputs */
    .form-label {
        color: var(--text-muted);
        font-weight: 500;
        font-size: 0.9rem;
        margin-bottom: 0.5rem;
        display: block;
    }

    .glass-input {
        width: 100%;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid var(--border-glass);
        color: white;
        padding: 0.9rem 1.2rem;
        border-radius: 12px;
        transition: all 0.3s ease;
        margin-bottom: 1.5rem;
    }

    .glass-input:focus {
        outline: none;
        border-color: var(--neon-cyan);
        background: rgba(255, 255, 255, 0.06);
        box-shadow: 0 0 15px rgba(0, 242, 254, 0.15);
    }

    .glass-input option {
        background: #0f1115;
        color: white;
    }

    /* Custom File Input */
    input[type="file"] {
        padding: 0.6rem;
    }

    input[type="file"]::file-selector-button {
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid var(--border-glass);
        color: white;
        padding: 0.5rem 1rem;
        border-radius: 8px;
        margin-right: 1rem;
        cursor: pointer;
        transition: all 0.3s ease;
    }

    input[type="file"]::file-selector-button:hover {
        background: rgba(0, 242, 254, 0.2);
        border-color: var(--neon-cyan);
        color: var(--neon-cyan);
    }

    /* Submit Button */
    .btn-glow-cyan {
        background: var(--gradient-primary);
        color: white !important;
        border: none;
        padding: 1rem 2rem;
        border-radius: 12px;
        font-weight: 700;
        font-size: 1.1rem;
        width: 100%;
        transition: all 0.3s ease;
        margin-top: 1rem;
    }

    .btn-glow-cyan:hover {
        box-shadow: 0 0 20px rgba(0, 242, 254, 0.4);
        transform: translateY(-2px);
    }
    
    .form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1.5rem;
    }
</style>
{% endblock %}

{% block content %}
<div class="container py-5">
    
    <div class="d-flex justify-content-between align-items-center mb-4" style="max-width: 800px; margin: 0 auto;">
        <a href="{% url 'admin:index' %}" class="text-decoration-none" style="color: var(--text-muted); transition: color 0.3s;">
            <i class="fas fa-arrow-left me-2"></i> Back to Dashboard
        </a>
    </div>

    <div class="glass-card">
        <h1 class="neon-title">Add New Product</h1>
        
        <form method="POST" action="{% url 'add_product' %}" enctype="multipart/form-data">
            {% csrf_token %}
            
            <div class="form-group">
                <label class="form-label">Product Name</label>
                <input type="text" name="name" class="glass-input" placeholder="e.g. Cyberpunk Neon Jacket" required>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">Category</label>
                    <select name="category" class="glass-input" required>
                        <option value="" disabled selected>Select a category...</option>
                        {% for category in categories %}
                            <option value="{{ category.id }}">{{ category.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Price (₹)</label>
                    <input type="number" step="0.01" name="price" class="glass-input" placeholder="0.00" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">Stock Quantity</label>
                    <input type="number" name="stock" class="glass-input" placeholder="e.g. 50" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Featured Image</label>
                    <input type="file" name="featured_image" class="glass-input" accept="image/*" required>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Short Description (Appears on cards)</label>
                <input type="text" name="short_description" class="glass-input" placeholder="Brief tagline..." maxlength="500" required>
            </div>

            <div class="form-group">
                <label class="form-label">Full Description</label>
                <textarea name="description" class="glass-input" rows="5" placeholder="Detailed product info..." required></textarea>
            </div>

            <button type="submit" class="btn-glow-cyan">
                <i class="fas fa-plus-circle me-2"></i> Publish Product
            </button>
        </form>
    </div>
</div>
{% endblock %}
